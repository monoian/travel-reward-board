<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>旅遊獎勵轉讓公告板</title>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body data-page="home">
    <header class="topbar">
      <a class="brand" href="/">旅遊獎勵轉讓公告板</a>
      <nav class="nav">
        <a href="/post.html">我要刊登</a>
        <a href="/my.html">管理我的公告</a>
        <a href="/admin/login.html">管理員</a>
      </nav>
    </header>

    <main class="shell">
      <section class="heading-row">
        <div>
          <p class="eyebrow">公司內部公告</p>
          <h1>旅遊獎勵轉讓公告板</h1>
          <p class="notice">本平台僅提供旅遊獎勵轉讓公告。實際聯繫、議價、付款由雙方自行處理。</p>
        </div>
        <div class="actions">
          <a class="button primary" href="/post.html">我要刊登</a>
          <a class="button secondary" href="/my.html">管理我的公告</a>
        </div>
      </section>

      <section class="toolbar" aria-label="公告篩選">
        <label>
          <span>國家</span>
          <select id="countryFilter">
            <option value="">全部</option>
          </select>
        </label>
        <label>
          <span>排序</span>
          <select id="sortFilter">
            <option value="newest">最新刊登</option>
            <option value="price_asc">價格低到高</option>
            <option value="price_desc">價格高到低</option>
          </select>
        </label>
      </section>

      <section id="homeStatus" class="status-message" role="status"></section>
      <section id="listingGrid" class="listing-grid" aria-live="polite"></section>
    </main>

    <script src="/assets/app.js?v=demo-preview-2" defer></script>
  </body>
</html>
