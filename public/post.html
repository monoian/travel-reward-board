<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>我要刊登 | 旅遊獎勵轉讓公告板</title>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body data-page="post">
    <header class="topbar">
      <a class="brand" href="/">旅遊獎勵轉讓公告板</a>
      <nav class="nav">
        <a href="/">公告列表</a>
        <a href="/my.html">管理我的公告</a>
      </nav>
    </header>

    <main class="shell narrow">
      <section class="heading-row">
        <div>
          <p class="eyebrow">刊登公告</p>
          <h1>我要刊登</h1>
        </div>
      </section>

      <section class="panel">
        <form id="lookupForm" class="stack">
          <label>
            <span>員工編號</span>
            <input id="employeeNo" name="employee_no" autocomplete="off" required />
          </label>
          <button class="button primary" type="submit">查詢得獎資料</button>
        </form>
        <div id="lookupMessage" class="status-message"></div>
      </section>

      <section id="winnerPanel" class="panel hidden">
        <div class="record-strip" id="winnerSummary"></div>
        <form id="postForm" class="form-grid">
          <label>
            <span>希望售價</span>
            <input name="price" inputmode="numeric" placeholder="25000" required />
          </label>
          <label>
            <span>是否可議價</span>
            <select name="negotiable" required>
              <option value="">請選擇</option>
              <option value="yes">可議價</option>
              <option value="no">不可議價</option>
            </select>
          </label>
          <label class="span-2">
            <span>聯絡方式</span>
            <input name="contact" placeholder="分機 1234 / LINE ID / 手機" maxlength="80" required />
          </label>
          <label class="span-2">
            <span>備註</span>
            <textarea name="note" rows="4" maxlength="500" placeholder="可留空"></textarea>
          </label>
          <button class="button primary span-2" type="submit">送出公告</button>
        </form>
      </section>
    </main>

    <script src="/assets/app.js?v=demo-preview-2" defer></script>
  </body>
</html>
